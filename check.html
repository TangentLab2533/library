<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格罗布书库 - 完整检测工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f7faff;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        .title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .sub-title {
            color: #666;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 22px;
            background: #48a0ff;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .btn:hover {
            background: #3182ce;
        }

        .item {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .ok {
            background: #e6ffe6;
            color: #006600;
        }

        .error {
            background: #ffe6e6;
            color: #cc0000;
            border-left: 6px solid #ff4444;
        }

        .tip {
            background: #fff9e6;
            padding: 16px;
            border-radius: 10px;
            margin-top: 30px;
            line-height: 1.7;
        }
    </style>
</head>

<body>
    <div class="title">🔍 格罗布书库 完整检测工具</div>
    <div class="sub-title">检测 index.txt 格式 + PDF/HTML 文件是否存在</div>

    <button class="btn" onclick="startCheck()">🔄 重新检测</button>
    <div id="result"></div>

    <div class="tip">
        <strong>✅ 正确格式：</strong>《书名》:文件.pdf,介绍.html<br>
        <strong>❌ 常见错误：</strong><br>
        • 把 , 写成 ; <br>
        • 把英文 : 写成中文 ：<br>
        • PDF / HTML 文件不存在<br>
        • 空行、多余换行
    </div>

    <script>
        window.onload = startCheck;

        async function startCheck() {
            const r = document.getElementById('result');
            r.innerHTML = "⏳ 正在检测中，请稍候...";

            let output = '';
            let allSuccess = true;

            try {
                // 1. 读取 index.txt
                const res = await fetch('./index.txt');
                if (!res.ok) {
                    r.innerHTML = `<div class="item error">❌ 未找到 index.txt 文件</div>`;
                    return;
                }

                const text = await res.text();
                const lines = text.split('\n');

                // 2. 逐行检查
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    const lineNum = i + 1;
                    const content = line.trim();

                    // 空行
                    if (content === '') {
                        output += `<div class="item error">第 ${lineNum} 行：空行（建议删除）<br>内容：【空行】</div>`;
                        allSuccess = false;
                        continue;
                    }

                    // 检查冒号
                    if (!line.includes(':')) {
                        output += `<div class="item error">第 ${lineNum} 行：缺少英文冒号 :<br>内容：${line}</div>`;
                        allSuccess = false;
                        continue;
                    }

                    const [name, paths] = line.split(':', 2);
                    if (!paths || paths.trim() === '') {
                        output += `<div class="item error">第 ${lineNum} 行：冒号后无内容<br>内容：${line}</div>`;
                        allSuccess = false;
                        continue;
                    }

                    // 检查逗号
                    if (!paths.includes(',')) {
                        output += `<div class="item error">第 ${lineNum} 行：缺少英文逗号 , 或写成了 ;<br>内容：${line}</div>`;
                        allSuccess = false;
                        continue;
                    }

                    const [pdfFile, htmlFile] = paths.split(',', 2).map(item => item.trim());
                    if (!pdfFile || !htmlFile) {
                        output += `<div class="item error">第 ${lineNum} 行：路径不完整<br>内容：${line}</div>`;
                        allSuccess = false;
                        continue;
                    }

                    // 检查 PDF 是否存在
                    const pdfExists = await checkFileExists(pdfFile);
                    // 检查 HTML 是否存在
                    const htmlExists = await checkFileExists(htmlFile);

                    if (!pdfExists && !htmlExists) {
                        output += `<div class="item error">第 ${lineNum} 行：缺失 ${pdfFile} 和 ${htmlFile}<br>书名：${name}</div>`;
                        allSuccess = false;
                    } else if (!pdfExists) {
                        output += `<div class="item error">第 ${lineNum} 行：缺失 ${pdfFile}<br>书名：${name}</div>`;
                        allSuccess = false;
                    } else if (!htmlExists) {
                        output += `<div class="item error">第 ${lineNum} 行：缺失 ${htmlFile}<br>书名：${name}</div>`;
                        allSuccess = false;
                    } else {
                        output += `<div class="item ok">第 ${lineNum} 行：✅ 格式正确 + 文件齐全<br>书名：${name}</div>`;
                    }
                }

                if (allSuccess) {
                    output = `<div class="item ok">✅ 全部检测通过！index.txt 格式正确，所有文件都存在！</div>` + output;
                }

                r.innerHTML = output;

            } catch (e) {
                r.innerHTML = `<div class="item error">检测失败：${e.message}</div>`;
            }
        }

        // 检查文件是否存在
        async function checkFileExists(filename) {
            try {
                const res = await fetch('./' + filename);
                return res.ok;
            } catch {
                return false;
            }
        }
    </script>
</body>
</html>
