<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index.txt 格式检测工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f5f8ff;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        .title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #222;
        }

        .btn {
            padding: 10px 20px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 25px;
        }

        .btn:hover {
            background: #3182ce;
        }

        .line {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 15px;
            line-height: 1.5;
        }

        .ok {
            background: #e6ffed;
            color: #007d2a;
        }

        .error {
            background: #ffe6e6;
            color: #c53030;
            border-left: 5px solid #f56565;
        }

        .tip {
            background: #fff9e6;
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="title">📝 index.txt 格式检测工具</div>
    <button class="btn" onclick="checkTxt()">重新检测</button>
    <div id="result"></div>

    <div class="tip">
        <strong>✅ 正确格式：</strong>《书名》:xxx.pdf,xxx.html<br>
        <strong>❌ 会报错的错误：</strong><br>
        1. 把英文逗号 , 写成 ; <br>
        2. 缺少英文冒号 : <br>
        3. 空行、多余换行 <br>
        4. 使用中文标点 ： ；
    </div>

    <script>
        window.onload = checkTxt;

        async function checkTxt() {
            const r = document.getElementById('result');
            r.innerHTML = "⌛ 正在读取并检测 index.txt...";

            try {
                const res = await fetch('./index.txt');
                if (!res.ok) throw new Error("未找到 index.txt 文件");
                
                const text = await res.text();
                const lines = text.split('\n');
                let out = '';

                lines.forEach((line, idx) => {
                    const num = idx + 1;
                    const content = line.trim();

                    // 空行
                    if (content === '') {
                        out += `<div class="line error">第 ${num} 行：空行（建议删除）<br>内容：${line || '(空)'}</div>`;
                        return;
                    }

                    // 无冒号
                    if (!line.includes(':')) {
                        out += `<div class="line error">第 ${num} 行：缺少英文冒号 :<br>内容：${line}</div>`;
                        return;
                    }

                    const [name, path] = line.split(':', 2);
                    if (!path) {
                        out += `<div class="line error">第 ${num} 行：冒号后无内容<br>内容：${line}</div>`;
                        return;
                    }

                    // 无逗号
                    if (!path.includes(',')) {
                        out += `<div class="line error">第 ${num} 行：缺少英文逗号 , 或写成了 ;<br>内容：${line}</div>`;
                        return;
                    }

                    const [pdf, htmlFile] = path.split(',', 2);
                    if (!pdf || !htmlFile || pdf.trim() === '' || htmlFile.trim() === '') {
                        out += `<div class="line error">第 ${num} 行：路径不完整<br>内容：${line}</div>`;
                        return;
                    }

                    // 正常
                    out += `<div class="line ok">第 ${num} 行：格式正确 ✅<br>内容：${line}</div>`;
                });

                r.innerHTML = out;
            } catch (e) {
                r.innerHTML = `<div class="line error">❌ 错误：${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
